<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GT-GELM Producciones</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ==========================
     PORTADA
========================== -->

<section class="hero">

    <img
    src="img/banner-principal-gtgelm.png"
    alt="GT-GELM Producciones">

    <div class="overlay">

        <h1>
            GT-GELM Producciones
        </h1>

        <p>

            Historias de Guatemala
            convertidas en música

        </p>

        <a
        href="#coleccion"
        class="btn-principal">

        🎵 Explorar Colección

        </a>

    </div>

</section>

<!-- ==========================
     VIDEO DESTACADO
========================== -->

<section
id="video"
class="video-section">

    <h2>

        🎬 Producción Destacada

    </h2>

    <div class="video-container">

        <iframe
        id="videoAleatorio"
        frameborder="0"
        allowfullscreen>

        </iframe>

    </div>

</section>

<!-- ==========================
     COLECCIÓN
========================== -->

<section
id="coleccion"
class="canciones">

    <h2 class="titulo-seccion">

        📚 Colección Histórica GT-GELM

    </h2>

    <div class="buscador">

        <input
        type="text"
        id="buscarCancion"
        placeholder="Buscar canción...">

    </div>

    <div
    id="contenedorCanciones"
    class="grid">

    </div>

</section>

<!-- ==========================
     FOOTER
========================== -->

<footer>

    <h3>

        GT-GELM Producciones

    </h3>

    <p>

        Historia • Cultura • Tradición • Guatemala

    </p>

    <br>

    <p>

        © 2026 GT-GELM

    </p>

</footer>

<!-- ==========================
     VIDEO ALEATORIO
========================== -->

<script>

const videos = [

"FDZK6Did5MI",
"QIT5jlnmgLc",
"F3NznREqluI"

];

const videoRandom =
videos[Math.floor(Math.random()*videos.length)];

document.getElementById(
"videoAleatorio"
).src =
"https://www.youtube.com/embed/" +
videoRandom;

</script>

<script src="app.js"></script>

<script>

document
.getElementById("buscarCancion")
.addEventListener("keyup", function(){

const texto =
this.value.toLowerCase();

const cards =
document.querySelectorAll(".card");

cards.forEach(card=>{

card.style.display =
card.innerText.toLowerCase()
.includes(texto)

? "block"

: "none";

});

});

</script>

</body>
</html>
